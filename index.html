<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#f5f1e8" />
<title>Il Ministero delle Eccezioni</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    color-scheme: light;
    --paper: #f5f1e8;
    --paper-soft: #ece6da;
    --paper-strong: #e1d7c7;
    --ink: #231e19;
    --muted: #6a5f54;
    --rule: rgba(35, 30, 25, 0.12);
    --surface: rgba(255, 255, 255, 0.68);
    --surface-strong: rgba(255, 255, 255, 0.84);
    --shadow: 0 24px 70px rgba(35, 30, 25, 0.08);
    --hero-accent: #a15644;
    --hero-accent-soft: rgba(161, 86, 68, 0.12);
    --link: #8a4637;
    --v1-bg: #e9efef;
    --v1-soft: #d8e2e3;
    --v1-ink: #15333b;
    --v1-muted: #46606a;
    --v1-accent: #2da7c7;
    --v2-bg: #f3ebdf;
    --v2-soft: #eadbc8;
    --v2-ink: #3b2a1f;
    --v2-muted: #7a6250;
    --v2-accent: #b16753;
    --max-width: 1200px;
    --content-width: 760px;
    --radius: 8px;
    --transition: 180ms ease;
  }

  html[data-theme="dark"] {
    color-scheme: dark;
    --paper: #141618;
    --paper-soft: #1b1f22;
    --paper-strong: #242a2e;
    --ink: #ece5d9;
    --muted: #b7ab9c;
    --rule: rgba(236, 229, 217, 0.12);
    --surface: rgba(27, 31, 34, 0.82);
    --surface-strong: rgba(36, 42, 46, 0.92);
    --shadow: 0 28px 90px rgba(0, 0, 0, 0.28);
    --hero-accent: #d29682;
    --hero-accent-soft: rgba(210, 150, 130, 0.14);
    --link: #e1ad9e;
    --v1-bg: #162026;
    --v1-soft: #1f2d34;
    --v1-ink: #e7f3f5;
    --v1-muted: #9db3b9;
    --v1-accent: #68d3f0;
    --v2-bg: #221d18;
    --v2-soft: #30261f;
    --v2-ink: #f2e5d5;
    --v2-muted: #c9b39e;
    --v2-accent: #db8e77;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--paper);
    color: var(--ink);
  }

  body {
    font-family: "Fraunces", Georgia, serif;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  img {
    max-width: 100%;
    display: block;
  }

  a {
    color: inherit;
  }

  button,
  select {
    font: inherit;
  }

  .shell {
    position: relative;
    min-height: 100vh;
  }

  .shell::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at top left, var(--hero-accent-soft), transparent 32%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 40%);
    opacity: 0.95;
  }

  .site-header {
    position: sticky;
    top: 0;
    z-index: 20;
    backdrop-filter: blur(14px);
    background: color-mix(in srgb, var(--paper) 84%, transparent);
    border-bottom: 1px solid var(--rule);
  }

  .site-header__inner {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 0.9rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .brand {
    text-decoration: none;
    display: inline-flex;
    flex-direction: column;
    gap: 0.1rem;
    min-width: 0;
  }

  .brand__eyebrow,
  .nav-link,
  .theme-toggle,
  .chip,
  .meta,
  .version-pill,
  .download-note,
  .toc-number,
  .status,
  .footer-note,
  .section-kicker,
  .chapter-nav__label {
    font-family: "Inter", system-ui, sans-serif;
  }

  .brand__eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .brand__title {
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.1;
    color: var(--ink);
  }

  .site-nav {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .nav-link,
  .theme-toggle {
    text-decoration: none;
    color: var(--muted);
    border: 1px solid var(--rule);
    background: var(--surface);
    border-radius: 999px;
    padding: 0.55rem 0.9rem;
    font-size: 0.82rem;
    font-weight: 600;
    transition: color var(--transition), border-color var(--transition), background var(--transition), transform var(--transition);
  }

  .nav-link:hover,
  .theme-toggle:hover,
  .nav-link:focus-visible,
  .theme-toggle:focus-visible,
  .button:hover,
  .button:focus-visible,
  .version-tab:hover,
  .version-tab:focus-visible,
  .chapter-card:hover,
  .chapter-card:focus-visible,
  .toc-link:hover,
  .toc-link:focus-visible,
  .chapter-nav a:hover,
  .chapter-nav a:focus-visible {
    color: var(--ink);
    border-color: color-mix(in srgb, var(--ink) 22%, transparent);
    transform: translateY(-1px);
  }

  .theme-toggle {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    cursor: pointer;
  }

  .icon {
    width: 1rem;
    height: 1rem;
    flex: 0 0 auto;
  }

  main {
    position: relative;
    z-index: 1;
  }

  .page {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 2rem 1.2rem 5rem;
  }

  .page--reading {
    max-width: calc(var(--content-width) + 2.4rem);
  }

  .hero {
    display: grid;
    grid-template-columns: minmax(240px, 380px) minmax(0, 1fr);
    gap: 2rem;
    align-items: start;
    padding: 2rem 0 3rem;
  }

  .cover-card,
  .panel,
  .version-card,
  .chapter-card,
  .reading-header,
  .project-card {
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    background: var(--surface);
    box-shadow: var(--shadow);
  }

  .cover-card {
    overflow: hidden;
    padding: 1rem;
    background: var(--surface-strong);
  }

  .cover-card img {
    width: 100%;
    aspect-ratio: 4 / 5.8;
    object-fit: cover;
    border-radius: 6px;
  }

  .cover-caption {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    padding-top: 0.85rem;
    color: var(--muted);
    font-size: 0.78rem;
  }

  .hero-copy {
    display: grid;
    gap: 1.35rem;
  }

  .section-kicker {
    font-size: 0.78rem;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--hero-accent);
    font-weight: 700;
  }

  .hero-title {
    margin: 0;
    font-size: clamp(2.7rem, 5vw, 5.1rem);
    line-height: 0.97;
    font-weight: 600;
    max-width: 11ch;
  }

  .hero-subtitle {
    margin: 0;
    max-width: 32rem;
    color: var(--muted);
    font-size: 1.04rem;
  }

  .hero-intro {
    max-width: 40rem;
    display: grid;
    gap: 0.95rem;
    font-size: 1.06rem;
    color: var(--ink);
  }

  .hero-intro p {
    margin: 0;
  }

  .button-row,
  .download-row,
  .version-tabs,
  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.85rem;
  }

  .button,
  .version-tab {
    border: 1px solid transparent;
    border-radius: 999px;
    text-decoration: none;
    padding: 0.95rem 1.2rem;
    transition: transform var(--transition), border-color var(--transition), background var(--transition), color var(--transition);
  }

  .button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    font-family: "Inter", system-ui, sans-serif;
    font-size: 0.92rem;
    font-weight: 700;
    cursor: pointer;
  }

  .button--primary {
    background: var(--ink);
    color: var(--paper);
    box-shadow: 0 14px 28px rgba(0, 0, 0, 0.12);
  }

  .button--muted {
    background: var(--surface-strong);
    border-color: var(--rule);
    color: var(--ink);
  }

  .button--v1 {
    background: var(--v1-bg);
    color: var(--v1-ink);
    border-color: color-mix(in srgb, var(--v1-accent) 40%, transparent);
  }

  .button--v2 {
    background: var(--v2-bg);
    color: var(--v2-ink);
    border-color: color-mix(in srgb, var(--v2-accent) 40%, transparent);
  }

  .download-note,
  .meta {
    color: var(--muted);
    font-size: 0.84rem;
  }

  .meta-row {
    gap: 1rem;
    align-items: center;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.4rem 0.72rem;
    border-radius: 999px;
    background: var(--hero-accent-soft);
    color: var(--hero-accent);
    font-size: 0.78rem;
    font-weight: 700;
  }

  .panel {
    padding: 1.3rem;
  }

  .panel + .panel,
  .section + .section {
    margin-top: 1.5rem;
  }

  .section {
    padding-top: 1rem;
  }

  .section-heading {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    align-items: end;
    margin-bottom: 1.2rem;
  }

  .section-title {
    margin: 0;
    font-size: 2rem;
    line-height: 1.05;
  }

  .section-copy {
    margin: 0;
    max-width: 38rem;
    color: var(--muted);
    font-size: 0.98rem;
  }

  .version-tabs {
    padding: 0.4rem;
    border: 1px solid var(--rule);
    border-radius: 999px;
    background: var(--surface);
    width: fit-content;
  }

  .version-tab {
    font-family: "Inter", system-ui, sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--muted);
    background: transparent;
    cursor: pointer;
  }

  .version-tab.is-active {
    background: var(--surface-strong);
    color: var(--ink);
    border-color: var(--rule);
  }

  .versions-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 1.1rem;
  }

  .version-card {
    padding: 1.45rem;
    display: grid;
    gap: 1rem;
    align-content: start;
  }

  .version-card--v1 {
    background: color-mix(in srgb, var(--v1-bg) 76%, var(--surface-strong));
  }

  .version-card--v2 {
    background: color-mix(in srgb, var(--v2-bg) 72%, var(--surface-strong));
  }

  .version-card__top,
  .version-card__footer {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    align-items: center;
  }

  .version-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.4rem 0.7rem;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.03em;
  }

  .version-card--v1 .version-pill {
    background: rgba(21, 51, 59, 0.1);
    color: var(--v1-ink);
  }

  .version-card--v2 .version-pill {
    background: rgba(177, 103, 83, 0.14);
    color: var(--v2-ink);
  }

  .version-card__title {
    margin: 0;
    font-size: 1.55rem;
  }

  .version-card__summary,
  .version-card__meta {
    margin: 0;
    color: inherit;
    font-size: 0.98rem;
  }

  .version-card--v1 .version-card__summary,
  .version-card--v1 .version-card__meta,
  .version-card--v1 .status {
    color: var(--v1-muted);
  }

  .version-card--v2 .version-card__summary,
  .version-card--v2 .version-card__meta,
  .version-card--v2 .status {
    color: var(--v2-muted);
  }

  .status {
    font-size: 0.8rem;
    font-weight: 600;
  }

  .chapters-grid,
  .toc-list {
    display: grid;
    gap: 0.75rem;
  }

  .chapters-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .chapter-card,
  .toc-link,
  .chapter-nav a {
    text-decoration: none;
    color: inherit;
    transition: transform var(--transition), border-color var(--transition), background var(--transition), color var(--transition);
  }

  .chapter-card {
    padding: 1rem 1.05rem;
    display: grid;
    gap: 0.5rem;
    min-height: 9.4rem;
  }

  .chapter-card__title,
  .toc-title {
    margin: 0;
    font-size: 1.1rem;
    line-height: 1.28;
  }

  .chapter-card__excerpt,
  .toc-meta,
  .reading-summary {
    margin: 0;
    color: var(--muted);
    font-size: 0.92rem;
  }

  .toc-link {
    border-top: 1px solid transparent;
    border-bottom: 1px solid var(--rule);
    display: grid;
    grid-template-columns: 56px minmax(0, 1fr) auto;
    gap: 1rem;
    align-items: center;
    padding: 1rem 0.2rem;
  }

  .toc-link:first-child {
    border-top-color: var(--rule);
  }

  .toc-number {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .toc-meta {
    font-family: "Inter", system-ui, sans-serif;
    font-size: 0.8rem;
  }

  .reading-header {
    padding: 1.2rem 1.3rem;
    margin-bottom: 1.2rem;
    background: var(--surface-strong);
  }

  .reading-header__title {
    margin: 0.35rem 0 0;
    font-size: clamp(2rem, 4vw, 3rem);
    line-height: 1;
  }

  .reading-header__top {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    align-items: start;
  }

  .reading-header__actions {
    display: flex;
    gap: 0.7rem;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .reading-article {
    padding: 0 0.1rem;
  }

  .reading-article h1,
  .reading-article h2,
  .reading-article h3 {
    line-height: 1.15;
    margin: 2rem 0 0.75rem;
  }

  .reading-article h1 {
    font-size: 2rem;
  }

  .reading-article h2 {
    font-size: 1.45rem;
  }

  .reading-article h3 {
    font-size: 1.18rem;
  }

  .reading-article p {
    margin: 0 0 1rem;
    font-size: 1.05rem;
    hyphens: auto;
  }

  .reading-article p + p {
    text-indent: 1.4em;
  }

  .reading-article h1 + p,
  .reading-article h2 + p,
  .reading-article h3 + p,
  .reading-article hr + p,
  .reading-article blockquote + p {
    text-indent: 0;
  }

  .reading-article blockquote {
    margin: 1.4rem 0;
    padding: 0.2rem 1rem;
    border-left: 2px solid var(--hero-accent);
    color: var(--muted);
  }

  .reading-article hr {
    border: 0;
    border-top: 1px solid var(--rule);
    margin: 2rem auto;
    width: 22%;
  }

  .reading-article ul,
  .reading-article ol {
    padding-left: 1.3rem;
    margin: 0 0 1rem;
  }

  .chapter-nav {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 1rem;
    margin-top: 2.4rem;
    padding-top: 1.3rem;
    border-top: 1px solid var(--rule);
  }

  .chapter-nav a {
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 1rem;
    background: var(--surface);
  }

  .chapter-nav a.next {
    text-align: right;
  }

  .chapter-nav__label {
    display: block;
    font-size: 0.74rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.25rem;
    font-weight: 700;
  }

  .chapter-nav__title {
    font-size: 1rem;
    line-height: 1.32;
  }

  .project-card {
    padding: 1.25rem;
  }

  .loading,
  .empty-state {
    padding: 2rem 0.4rem;
    text-align: center;
    color: var(--muted);
    font-family: "Inter", system-ui, sans-serif;
  }

  .site-footer {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 0 1.2rem 2.5rem;
  }

  .site-footer__inner {
    border-top: 1px solid var(--rule);
    padding-top: 1.2rem;
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .footer-note {
    margin: 0;
    color: var(--muted);
    font-size: 0.82rem;
  }

  .footer-note a {
    color: var(--link);
  }

  @media (max-width: 980px) {
    .hero,
    .versions-grid,
    .chapters-grid {
      grid-template-columns: 1fr;
    }

    .hero-title {
      max-width: 14ch;
    }

    .section-heading,
    .reading-header__top,
    .version-card__top,
    .version-card__footer,
    .site-header__inner,
    .site-footer__inner {
      align-items: start;
    }

    .section-heading,
    .site-header__inner,
    .site-footer__inner {
      flex-direction: column;
    }

    .reading-header__top {
      flex-direction: column;
    }

    .reading-header__actions {
      justify-content: flex-start;
    }

    .chapter-nav {
      grid-template-columns: 1fr;
    }

    .chapter-nav a.next {
      text-align: left;
    }
  }

  @media (max-width: 640px) {
    .page {
      padding: 1.3rem 1rem 4rem;
    }

    .hero {
      gap: 1.35rem;
      padding-top: 1.1rem;
    }

    .hero-title {
      font-size: 2.5rem;
      max-width: 9ch;
    }

    .hero-intro,
    .hero-subtitle,
    .reading-article p {
      font-size: 1rem;
    }

    .button-row,
    .download-row {
      display: grid;
      grid-template-columns: 1fr;
    }

    .button,
    .nav-link,
    .theme-toggle {
      width: 100%;
      justify-content: center;
    }

    .version-tabs {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
    }

    .version-tab {
      text-align: center;
    }

    .toc-link {
      grid-template-columns: 1fr;
      gap: 0.45rem;
    }

    .toc-meta {
      justify-self: start;
    }
  }
</style>
</head>
<body>
<div class="shell">
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" href="#/">
        <span class="brand__eyebrow">Progetto narrativo</span>
        <span class="brand__title">Il Ministero delle Eccezioni</span>
      </a>
      <nav class="site-nav" aria-label="Navigazione principale">
        <a class="nav-link" href="#/">Home</a>
        <a class="nav-link" href="#/v1codex">V1Codex</a>
        <a class="nav-link" href="#/v2claude">V2Claude</a>

        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Attiva o disattiva la modalità scura">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 3v2.5" />
            <path d="M12 18.5V21" />
            <path d="M3 12h2.5" />

            <path d="m16.6 16.6 1.76 1.76" />
            <path d="m5.64 18.36 1.76-1.76" />
            <path d="m16.6 7.4 1.76-1.76" />
            <circle cx="12" cy="12" r="4.2" />
          </svg>
          <span>Tema</span>
        </button>
      </nav>
    </div>
  </header>

  <main id="app">
    <div class="page">
      <div class="loading">Caricamento in corso…</div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <p class="footer-note">Romanzo sperimentale a doppia voce, leggibile online e scaricabile in EPUB.</p>
      <p class="footer-note"><a href="https://github.com/tongatron/ministero-delle-eccezioni">GitHub</a></p>
    </div>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const VERSIONS = {
  v1codex: {
    key: "v1codex",
    label: "V1Codex",
    homeTitle: "Archivio procedurale",
    base: "capitoli%20%28V%201.0%20Codex%29",
    epub: "build/ministero-delle-eccezioni-v1codex.epub",
    themeClass: "v1",
    intro: "Versione tecnica, archivistica, più fredda e deliberatamente burocratica: il romanzo come fascicolo ministeriale compilato da un'intelligenza artificiale che non conosce l'imbarazzo.",
    summary: "Una lettura più razionale, asciutta e documentale, in cui l'assurdo emerge dalla precisione stessa del sistema.",

function stripLeadingHeading(markdown) {

function setDocumentTheme(theme) {
  const root = document.documentElement;
  if (theme === "dark") {
    root.dataset.theme = "dark";
    localStorage.setItem("ministero-theme", "dark");
  } else if (theme === "light") {
    delete root.dataset.theme;
    localStorage.setItem("ministero-theme", "light");
  } else {
    localStorage.removeItem("ministero-theme");
    if (MEDIA_THEME.matches) {
      root.dataset.theme = "dark";
    } else {
      delete root.dataset.theme;
    }
  }
}

function initializeTheme() {
  const saved = localStorage.getItem("ministero-theme");
  setDocumentTheme(saved || "system");
}

MEDIA_THEME.addEventListener("change", () => {
  if (!localStorage.getItem("ministero-theme")) {
    setDocumentTheme("system");
  }
});

themeToggle.addEventListener("click", () => {
  const current = document.documentElement.dataset.theme === "dark" ? "dark" : "light";
  setDocumentTheme(current === "dark" ? "light" : "dark");
});

async function renderChapter(versionKey, slug) {
  const version = versionByKey(versionKey);
  const index = version.chapters.findIndex((chapter) => chapter.slug === slug);
  if (index === -1) {
    renderVersionIndex(versionKey);
    return;
  }

  const chapter = version.chapters[index];
  document.title = `${chapter.title} · ${version.label} · Il Ministero delle Eccezioni`;
  app.innerHTML = `
    <div class="page page--reading">
      <div class="loading">Caricamento del capitolo…</div>
    </div>
  `;

  try {
    const response = await fetch(`${version.base}/${chapter.file}`, { cache: "no-cache" });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const markdown = await response.text();
    const html = marked.parse(stripLeadingHeading(markdown));
    const previous = index > 0 ? version.chapters[index - 1] : null;
    const next = index < version.chapters.length - 1 ? version.chapters[index + 1] : null;

    app.innerHTML = `
      <div class="page page--reading">
        <section class="reading-header">
          <div class="reading-header__top">
            <div>
              <div class="section-kicker">${version.label} · ${formatChapterNumber(chapter)}</div>
              <h1 class="reading-header__title">${chapter.title}</h1>
              <p class="reading-summary">${chapter.excerpt}</p>
            </div>
            <div class="reading-header__actions">
              <a class="button ${version.key === "v1codex" ? "button--v1" : "button--v2"}" href="${versionHref(version.key)}">Indice</a>
              <a class="button button--muted" href="${version.epub}" download>Scarica EPUB</a>

        <article class="reading-article">${html}</article>

        <nav class="chapter-nav" aria-label="Navigazione capitoli">
          ${previous ? `
            <a href="${chapterHref(version.key, previous.slug)}">
              <span class="chapter-nav__label">Precedente</span>
              <span class="chapter-nav__title">${previous.title}</span>
            </a>
          ` : `
            <a href="${versionHref(version.key)}">
              <span class="chapter-nav__label">Indice</span>
              <span class="chapter-nav__title">Tutti i capitoli</span>
            </a>
          `}

            <a class="next" href="${chapterHref(version.key, next.slug)}">
              <span class="chapter-nav__label">Successivo</span>
              <span class="chapter-nav__title">${next.title}</span>

              <span class="chapter-nav__title">Torna alla landing</span>
            </a>
          `}
        </nav>
      </div>
    `;

    window.scrollTo(0, 0);
  } catch (error) {
    app.innerHTML = `

          ` : `
            <a class="next" href="#/progetto">
              <span class="chapter-nav__label">Indice</span>
              <span class="chapter-nav__title">Tutti i documenti</span>
            </a>
          `}
        </nav>
      </div>
    `;

    window.scrollTo(0, 0);
  } catch (error) {
    app.innerHTML = `
      <div class="page page--reading">
        <div class="empty-state">Impossibile caricare il documento. ${error.message}</div>
      </div>
    `;
  }
}

function route() {
  const hash = location.hash.replace(/^#\/?/, "");
  if (!hash) {
    renderHome();
    return;
  }

  const parts = hash.split("/").filter(Boolean);

  if (parts[0] === "progetto") {
    if (parts.length === 1) {
      renderProjectIndex();
    } else {
      renderProjectDoc(parts.slice(1).join("/"));
    }
    return;
  }

  if (VERSIONS[parts[0]]) {
    if (parts.length === 1) {
      renderVersionIndex(parts[0]);
    } else {
      renderChapter(parts[0], parts.slice(1).join("/"));
    }
    return;
  }

  renderHome();
}

window.addEventListener("hashchange", route);
initializeTheme();
route();
</script>
</body>
</html>
